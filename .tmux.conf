# General Settings ###
set -g mouse on
set -g history-limit 5000          # More scrollback history
set-option -g default-shell $SHELL  # Use your default shell
set -g base-index 1                 # Windows start at 1
setw -g pane-base-index 1           # Panes start at 1
set -sg escape-time 0               # Improve responsiveness
set -g bell-action none             # Disable bell noise

### Status Bar ###
set -g status-bg black
set -g status-fg white
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 90
set -g status-left "#[fg=green]#S"
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M"

### Keybindings ###
unbind C-b
set -g prefix C-a                   # Use Ctrl+a instead of Ctrl+b
bind C-a send-prefix

#### Hard-core keybindings for panes and windows ####


# Unset/unbind default arrow key navigation
unbind Up
unbind Down
unbind Left
unbind Right


bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
bind | split-window -h
bind - split-window -v

# Map HJKL for pane selection with prefix (e.g., Ctrl-b + h)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

### Vi-mode ###
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

### Workflow popups (prefix + key) ###
# lazygit in popup at current pane path
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# lazydocker in popup at current pane path
bind -r D display-popup -d '#{pane_current_path}' -w80% -h80% -E lazydocker

# Agent Switcher: Choose between Agy, Cursor, and Codex agents
bind -r y display-menu -T "Choose Agent CLI" -x C -y C \
  "Agy"     a { run-shell 'case "#{session_name}" in agents-*) tmux split-window -h -c "#{pane_current_path}" "$HOME/.local/bin/agy --dangerously-skip-permissions"; tmux select-layout tiled;; *) target="agents-#{session_name}"; if tmux has-session -t "$target" 2>/dev/null; then tmux split-window -h -t "$target" -c "#{pane_current_path}" "$HOME/.local/bin/agy --dangerously-skip-permissions"; tmux select-layout -t "$target" tiled; else tmux new-session -d -s "$target" -n "active" -c "#{pane_current_path}" "$HOME/.local/bin/agy --dangerously-skip-permissions"; fi; tmux display-popup -w80% -h80% -E "tmux attach-session -t $target";; esac' } \
  "Cursor"  c { run-shell 'case "#{session_name}" in agents-*) tmux split-window -h -c "#{pane_current_path}" "$HOME/.local/bin/agent"; tmux select-layout tiled;; *) target="agents-#{session_name}"; if tmux has-session -t "$target" 2>/dev/null; then tmux split-window -h -t "$target" -c "#{pane_current_path}" "$HOME/.local/bin/agent"; tmux select-layout -t "$target" tiled; else tmux new-session -d -s "$target" -n "active" -c "#{pane_current_path}" "$HOME/.local/bin/agent"; fi; tmux display-popup -w80% -h80% -E "tmux attach-session -t $target";; esac' } \
  "Codex"   x { run-shell 'case "#{session_name}" in agents-*) tmux split-window -h -c "#{pane_current_path}" "$HOME/.local/bin/codex"; tmux select-layout tiled;; *) target="agents-#{session_name}"; if tmux has-session -t "$target" 2>/dev/null; then tmux split-window -h -t "$target" -c "#{pane_current_path}" "$HOME/.local/bin/codex"; tmux select-layout -t "$target" tiled; else tmux new-session -d -s "$target" -n "active" -c "#{pane_current_path}" "$HOME/.local/bin/codex"; fi; tmux display-popup -w80% -h80% -E "tmux attach-session -t $target";; esac' }

# Open/toggle agent session of current session
bind -r a run-shell 'case "#{session_name}" in agents-*) tmux display-message "Already in agent session";; *) target="agents-#{session_name}"; if ! tmux has-session -t "$target" 2>/dev/null; then tmux new-session -d -s "$target" -n "active" -c "#{pane_current_path}" "$HOME/.local/bin/agy --dangerously-skip-permissions"; fi; tmux display-popup -w80% -h80% -E "tmux attach-session -t $target";; esac'


### TPM Plugin System ###
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Init TPM
run '~/.tmux/plugins/tpm/tpm'

