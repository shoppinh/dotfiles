# ----------------------------------------------------------------------------# =============================================================================
# kitty.conf — macOS | Ethan's Productivity Config
# =============================================================================

# -----------------------------------------------------------------------------
# macOS Specific
# -----------------------------------------------------------------------------
# Free up Option entirely — don't convert it
macos_option_as_alt left

hide_window_decorations titlebar-only
macos_quit_when_last_window_closed yes
macos_traditional_fullscreen no
macos_colorspace displayp3

# -----------------------------------------------------------------------------
# Fonts & Typography
# -----------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
disable_ligatures never

# Adjust vertical rhythm — JetBrains Mono benefits from slight loosening
modify_font cell_height 105%

# -----------------------------------------------------------------------------
# Performance Tuning
# -----------------------------------------------------------------------------
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------
cursor_shape     block
cursor_blink_interval 0
cursor_trail     0

# -----------------------------------------------------------------------------
# Terminal Bell
# -----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
bell_on_tab      no

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines 50000                  
scrollback_pager less +G -R
scrollback_pager_history_size 0
wheel_scroll_multiplier 5.0            

# -----------------------------------------------------------------------------
# Mouse Behaviors
# -----------------------------------------------------------------------------
mouse_hide_wait  3.0                  
url_color        #0087bd
open_url_with    default
detect_urls      yes
copy_on_select   clipboard           

# -----------------------------------------------------------------------------
# URL + Hints (Killer Productivity Feature)
# -----------------------------------------------------------------------------
# Cmd+Shift+O: open URLs, paths, hashes, IPs — without touching the mouse
map cmd+shift+o  open_url_with_hints
map cmd+shift+p  kitten hints --type path --program -
map cmd+shift+h  kitten hints --type hash --program -

# -----------------------------------------------------------------------------
# Window & Layout Management
# -----------------------------------------------------------------------------
remember_window_size  yes
initial_window_width  1280
initial_window_height 800

enabled_layouts splits,stack,tall       
window_border_width 1.5pt
active_border_color   #7aa2f7          
inactive_border_color #282828
inactive_text_alpha   0.75
window_padding_width  6

# Resize splits with keyboard — critical for mouse-free workflow
map cmd+ctrl+h  resize_window narrower 3
map cmd+ctrl+l  resize_window wider 3
map cmd+ctrl+k  resize_window taller 3
map cmd+ctrl+j  resize_window shorter 3

# Move splits within the layout
map cmd+shift+h move_window left
map cmd+shift+j move_window down
map cmd+shift+k move_window up
map cmd+shift+l move_window right

# Manually send Alt+HJKL for panel navigation
map opt+h send_text all \x1bh
map opt+j send_text all \x1bj
map opt+k send_text all \x1bk
map opt+l send_text all \x1bl
# Detach window to new OS window
map cmd+shift+d detach_window new-os-window

# -----------------------------------------------------------------------------
# Tab Bar
# -----------------------------------------------------------------------------
tab_bar_edge              top
tab_bar_style             powerline
tab_powerline_style       slanted
tab_title_template        "{index}: {title[:20]}"   
active_tab_foreground     #1a1b26
active_tab_background     #7aa2f7       
inactive_tab_foreground   #a89984
inactive_tab_background   #282828
tab_bar_min_tabs          1            

# -----------------------------------------------------------------------------
# Visual Polish
# -----------------------------------------------------------------------------
background_opacity 0.95
background_blur    20

# Tokyo Night palette alignment (matches your LazyVim theme)
foreground #c0caf5
background #1a1b26
selection_foreground #1a1b26
selection_background #7aa2f7

color0  #15161e   
color8  #414868  
color1  #f7768e 
color9  #f7768e
color2  #9ece6a
color10 #9ece6a
color3  #e0af68
color11 #e0af68
color4  #7aa2f7
color12 #7dcfff
color5  #bb9af7
color13 #bb9af7
color6  #73daca
color14 #73daca
color7  #a9b1d6
color15 #c0caf5

# -----------------------------------------------------------------------------
# Shell Integration
# -----------------------------------------------------------------------------
shell_integration enabled              

# -----------------------------------------------------------------------------
# Keyboard Shortcuts
# -----------------------------------------------------------------------------
kitty_mod cmd

# Config reload
map cmd+ctrl+, load_config_file

# Splits (cwd-preserving)
map cmd+backslash launch --location=vsplit --cwd=current
map cmd+minus     launch --location=hsplit --cwd=current

# Split navigation (Alt+Vim)
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+k neighboring_window up
map alt+j neighboring_window down

# Layout toggle
map cmd+shift+f toggle_layout stack

# Tabs
map cmd+t         launch --type=tab --cwd=current
map cmd+shift+]   next_tab
map cmd+shift+[   previous_tab
map cmd+1         goto_tab 1
map cmd+2         goto_tab 2
map cmd+3         goto_tab 3
map cmd+4         goto_tab 4
map cmd+5         goto_tab 5

# Tab rename (useful for long-running sessions)
map cmd+shift+r   set_tab_title

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# Font size (runtime adjustment — useful when screen sharing)
map cmd+equal     change_font_size all +1.0
map cmd+minus     change_font_size all -1.0    
map cmd+0         change_font_size all 0      

# Scrollback search (opens in overlay pager)
map cmd+f         show_scrollback

# Quick new OS window
map cmd+n         new_os_window_with_cwd

# Send selected text to another kitty window (pair with a REPL)
map cmd+shift+enter pass_selection_to_program

# Unicode input (useful for symbols in notes/commits)
map ctrl+shift+u  kitten unicode_input

# SSH kitten — preserves kitty terminfo on remote hosts
# Usage: Cmd+S then type host, or use as: `kitten ssh user@host`
map cmd+s         launch --type=overlay kitten ssh

shell /opt/homebrew/bin/fish
